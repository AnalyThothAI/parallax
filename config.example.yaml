# GMGN Twitter Intel
ws_token: "replace-with-a-strong-token"
handles:
  - toly
  - traderpow
  - theunipcs
  - dotyyds1234
  - brc20niubi
  - jessepollak
  - cz_binance
  - heyibinance
  - elonmusk
  - cookerflips
  - himgajria
  - cryptodevinl
  - spidercrypto0x

api:
  host: "0.0.0.0"
  port: 8765
  heartbeat_interval: 30
  replay_limit: 100

storage:
  postgres:
    dsn: "postgresql://gmgn_app@postgres:5432/gmgn_twitter_intel"
    password_file: "postgres_password"
    pool_min_size: 1
    pool_max_size: 10
    connect_timeout_seconds: 5

llm:
  api_key:
  model:
  base_url: "https://api.openai.com/v1"
  timeout_seconds: 20
  enrichment_poll_interval: 2

gmgn:
  api_key:
  openapi_base_url: "https://openapi.gmgn.ai"
  timeout_seconds: 5
  token_info_cache_ttl_seconds: 60

providers:
  okx:
    cex_base_url: "https://www.okx.com"
    dex_base_url: "https://web3.okx.com"
    dex_chain_indexes: ["501", "1", "56", "8453"]
    timeout_seconds: 15

upstream:
  chains: ["sol", "eth", "base", "bsc"]
  channels: ["twitter_monitor_basic", "twitter_monitor_token"]
  app_version: "20260429-12894-ccec416"
  proxy:
  reconnect_delay: 3
  heartbeat_interval: 25
  idle_timeout: 90

collector:
  watchdog_interval: 30
  stale_timeout: 180
