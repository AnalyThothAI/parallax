# GMGN Twitter Intel
ws_token: "replace-with-a-strong-token"
handles:
  - toly
  - traderpow
  - theunipcs
  - dotyyds1234
  - brc20niubi
  - jessepollak
  - cz_binance
  - heyibinance
  - elonmusk
  - cookerflips
  - himgajria
  - cryptodevinl
  - spidercrypto0x

api:
  host: "0.0.0.0"
  port: 8765
  heartbeat_interval: 30
  replay_limit: 100

storage:
  postgres:
    dsn: "postgresql://gmgn_app@postgres:5432/gmgn_twitter_intel"
    password_file: "postgres_password"
    pool_min_size: 1
    pool_max_size: 16
    connect_timeout_seconds: 5

llm:
  provider: "openai"
  api_key:
  base_url: "https://api.openai.com/v1"
  timeout_seconds: 120
  trace_enabled: true
  trace_api_key:
  trace_include_sensitive_data: false

gmgn:
  api_key:
  openapi_base_url: "https://openapi.gmgn.ai"
  timeout_seconds: 5
  token_info_cache_ttl_seconds: 60

providers:
  okx:
    dex_base_url: "https://web3.okx.com"
    dex_chain_indexes: ["501", "1", "56", "8453", "607"]
    dex_ws_url: "wss://wsdex.okx.com/ws/v6/dex"
    dex_api_key:
    dex_secret_key:
    dex_passphrase:
    timeout_seconds: 15
  binance:
    enabled: true
    web3_base_url: "https://web3.binance.com"
    cex_profile_base_url: "https://www.binance.com"
    usdm_futures_base_url: "https://fapi.binance.com"
    cex_universe_quote_symbol: "USDT"
    cex_universe_contract_type: "PERPETUAL"
    timeout_seconds: 15
  macrodata:
    enabled: true
    quote_timeout_seconds: 5
    quote_cache_ttl_seconds: 30
    fred_api_key_env: "FINANCE_FRED_API_KEY"

news_intel:
  enabled: true
  # Worker runtime knobs live in workers.yaml, not config.yaml. Ensure
  # news_page_projection.wakes_on there includes news_item_brief_updated.
  sources:
    - source_id: coindesk
      provider_type: rss
      feed_url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
      source_domain: coindesk.com
      source_name: CoinDesk
      source_role: specialist_media
      trust_tier: high
      coverage_tags: ["crypto_market", "crypto_policy", "exchange_listing"]
      authority_scope:
        event_types: ["exchange_listing", "regulatory_action", "funding"]
        domains: ["coindesk.com"]
      fetch_policy:
        max_items: 50
      context_policy:
        fetch_discussion: false
      cost_policy:
        class: free
      enabled: true
      refresh_interval_seconds: 300
    - source_id: cointelegraph
      provider_type: rss
      feed_url: "https://cointelegraph.com/rss"
      source_domain: cointelegraph.com
      source_name: CoinTelegraph
      source_role: specialist_media
      trust_tier: standard
      enabled: true
      refresh_interval_seconds: 300
    - source_id: theblock
      provider_type: rss
      feed_url: "https://www.theblock.co/rss.xml"
      source_domain: theblock.co
      source_name: The Block
      source_role: specialist_media
      trust_tier: high
      enabled: true
      refresh_interval_seconds: 300
    - source_id: bitcoinmagazine
      provider_type: rss
      feed_url: "https://bitcoinmagazine.com/feed"
      source_domain: bitcoinmagazine.com
      source_name: Bitcoin Magazine
      source_role: specialist_media
      trust_tier: standard
      enabled: true
      refresh_interval_seconds: 600
    - source_id: decrypt
      provider_type: rss
      feed_url: "https://decrypt.co/feed"
      source_domain: decrypt.co
      source_name: Decrypt
      source_role: specialist_media
      trust_tier: standard
      enabled: true
      refresh_interval_seconds: 300
    - source_id: marketwatch-top-stories
      provider_type: rss
      feed_url: "http://feeds.marketwatch.com/marketwatch/topstories/"
      source_domain: marketwatch.com
      source_name: MarketWatch Top Stories
      source_role: specialist_media
      trust_tier: standard
      enabled: true
      refresh_interval_seconds: 600
    - source_id: wsj-markets
      provider_type: rss
      feed_url: "https://feeds.a.dj.com/rss/RSSMarketsMain.xml"
      source_domain: wsj.com
      source_name: WSJ Markets
      source_role: specialist_media
      trust_tier: high
      enabled: true
      refresh_interval_seconds: 600
    - source_id: cnbc-economy
      provider_type: rss
      feed_url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=20910258"
      source_domain: cnbc.com
      source_name: CNBC Economy
      source_role: specialist_media
      trust_tier: standard
      enabled: true
      refresh_interval_seconds: 600
    - source_id: cnbc-markets
      provider_type: rss
      feed_url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=15839069"
      source_domain: cnbc.com
      source_name: CNBC Markets
      source_role: specialist_media
      trust_tier: standard
      enabled: true
      refresh_interval_seconds: 600
    - source_id: yahoo-finance
      provider_type: rss
      feed_url: "https://finance.yahoo.com/news/rssindex"
      source_domain: finance.yahoo.com
      source_name: Yahoo Finance
      source_role: aggregator
      trust_tier: standard
      enabled: true
      refresh_interval_seconds: 600
    - source_id: cryptopanic-en
      provider_type: cryptopanic
      feed_url: "cryptopanic://posts?regions=en&kind=all&max_items=50&profile_dir=~/.gmgn-twitter-intel/cryptopanic-profile&timeout=60"
      source_domain: cryptopanic.com
      source_name: CryptoPanic
      source_role: aggregator
      trust_tier: standard
      enabled: true
      refresh_interval_seconds: 300

upstream:
  chains: ["sol", "eth", "base", "bsc"]
  channels: ["twitter_monitor_basic", "twitter_monitor_token"]
  app_version: "20260429-12894-ccec416"
  proxy:
  reconnect_delay: 3
  heartbeat_interval: 25
  idle_timeout: 90
