[project]
name = "gmgn-twitter-cli"
version = "0.1.0"
description = "CLI service for GMGN anonymous Twitter signals with LanceDB replay and public WebSocket API."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "eth-hash[pycryptodome]>=0.8.0",
    "eth-utils>=5.0.0",
    "filelock>=3.13",
    "fastapi>=0.115.0",
    "httpx>=0.27.0",
    "lancedb>=0.29.2",
    "litellm>=1.80,<2.0",
    "loguru>=0.7.2",
    "pyarrow>=22.0.0",
    "pydantic>=2.8.0",
    "pydantic-settings>=2.4.0",
    "python-dotenv>=1.0.1",
    "solders>=0.26.0",
    "uvicorn[standard]>=0.30.0",
    "websockets>=12.0",
]

[dependency-groups]
dev = [
    "httpx>=0.27.0",
    "pytest>=8.3.0",
    "ruff>=0.8.0",
]

[project.scripts]
gmgn-twitter-cli = "gmgn_twitter_cli.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gmgn_twitter_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
