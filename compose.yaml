services:
  gmgn-twitter-cli:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8765
      XDG_STATE_HOME: /data/state
      LANCEDB_PATH: /data/twitter_intel.lancedb
    ports:
      - "${API_PORT:-8765}:8765"
    volumes:
      - ${GMGN_TWITTER_DATA_DIR:-${HOME}/.local/state/gmgn-twitter-cli}:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 8765), 10); s.close()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
