name: gmgn-twitter-intel

services:
  app:
    build: .
    init: true
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ${HOME}/.gmgn-twitter-intel:/root/.gmgn-twitter-intel
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8765/readyz', timeout=10).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
