name: gmgn-twitter-intel

services:
  postgres:
    build:
      context: .
      dockerfile: ops/postgres/Dockerfile
    image: gmgn-twitter-intel-postgres-observability:18
    restart: unless-stopped
    shm_size: 256mb
    command:
      [
        "postgres",
        "-c",
        "shared_preload_libraries=pg_stat_statements,powa,pg_stat_kcache,pg_qualstats,pg_wait_sampling",
        "-c",
        "compute_query_id=on",
        "-c",
        "pg_stat_statements.max=20000",
        "-c",
        "pg_stat_statements.track=all",
        "-c",
        "pg_stat_statements.track_planning=off",
        "-c",
        "track_io_timing=on",
        "-c",
        "track_wal_io_timing=on",
        "-c",
        "track_activity_query_size=4096",
        "-c",
        "logging_collector=on",
        "-c",
        "log_destination=stderr",
        "-c",
        "log_directory=/var/log/postgresql",
        "-c",
        "log_filename=postgresql-%Y-%m-%d_%H%M%S.log",
        "-c",
        "log_rotation_age=1d",
        "-c",
        "log_rotation_size=100MB",
        "-c",
        "log_truncate_on_rotation=off",
        "-c",
        "log_line_prefix=%m [%p] db=%d,user=%u,app=%a,client=%h,query_id=%Q ",
        "-c",
        "log_parameter_max_length=0",
        "-c",
        "log_min_duration_statement=250ms",
        "-c",
        "log_lock_waits=on",
        "-c",
        "deadlock_timeout=1s",
        "-c",
        "log_temp_files=64MB",
        "-c",
        "log_checkpoints=on",
        "-c",
        "log_autovacuum_min_duration=5s",
        "-c",
        "log_statement=none",
      ]
    environment:
      POSTGRES_DB: gmgn_twitter_intel
      POSTGRES_USER: gmgn_app
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --data-checksums"
    secrets:
      - postgres_password
    ports:
      - "${GMGN_POSTGRES_HOST:-127.0.0.1}:${GMGN_POSTGRES_PORT:-56532}:5432"
    volumes:
      - gmgn-twitter-intel-postgres:/var/lib/postgresql
      - ${HOME}/.gmgn-twitter-intel/postgres-logs:/var/log/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gmgn_app -d gmgn_twitter_intel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  migrate:
    build:
      context: .
      secrets:
        - github_token
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${HOME}/.gmgn-twitter-intel:/root/.gmgn-twitter-intel
    command: ["gmgn-twitter-intel", "db", "migrate"]

  app:
    build:
      context: .
      secrets:
        - github_token
    init: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8765:8765"
    volumes:
      - ${HOME}/.gmgn-twitter-intel:/root/.gmgn-twitter-intel
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8765/healthz', timeout=10).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  powa-web:
    image: gmgn-twitter-intel-postgres-observability:18
    init: true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8888:8888"
    command:
      [
        "bash",
        "-lc",
        "cookie_secret=$$(python3 - <<'PY'\nimport secrets\nprint(secrets.token_urlsafe(48))\nPY\n); printf \"servers={\\n  'main': {\\n    'host': 'postgres',\\n    'port': '5432',\\n    'database': 'powa'\\n  }\\n}\\ncookie_secret='%s'\\n\" \"$$cookie_secret\" > /tmp/powa-web.conf; exec powa-web --address=0.0.0.0 --port=8888 --config=/tmp/powa-web.conf",
      ]

  pgbadger:
    image: gmgn-twitter-intel-postgres-observability:18
    profiles:
      - observability-report
    volumes:
      - ${HOME}/.gmgn-twitter-intel/postgres-logs:/var/log/postgresql:ro
      - ${HOME}/.gmgn-twitter-intel/reports/pgbadger:/reports
    command:
      [
        "bash",
        "-lc",
        "mkdir -p /reports && logs=$$(find /var/log/postgresql -maxdepth 1 -type f -name 'postgresql-*.log' | sort); if [ -z \"$$logs\" ]; then echo 'no PostgreSQL log files found under /var/log/postgresql' >&2; exit 1; fi; pgbadger -f stderr -o /reports/pgbadger-latest.html $$logs",
      ]

volumes:
  gmgn-twitter-intel-postgres:

secrets:
  postgres_password:
    file: ${HOME}/.gmgn-twitter-intel/postgres_password
  github_token:
    environment: GITHUB_TOKEN
