name: gmgn-twitter-intel

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8765
      GMGN_TWITTER_HOME: /data
      OMP_NUM_THREADS: 1
      OPENBLAS_NUM_THREADS: 1
      MKL_NUM_THREADS: 1
      NUMEXPR_NUM_THREADS: 1
      RAYON_NUM_THREADS: 1
      LANCE_CPU_THREADS: 1
      LANCE_IO_THREADS: 1
    ports:
      - "${API_PORT:-8765}:8765"
    volumes:
      - ${GMGN_TWITTER_HOME:-${HOME}/.gmgn-twitter-intel}:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s = socket.create_connection(('127.0.0.1', 8765), 10); s.close()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
